version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - GROQ_API_KEY=${GROQ_API_KEY}
      - REDIS_URL=redis://redis:6379
    volumes:
      - codenest-projects:/app/Backend/projects
    depends_on:
      redis:
        condition: service_healthy
      runner:
        condition: service_started
    restart: always
    cpus: 0.5
    mem_limit: 512m
    networks:
      - public
      - runner_internal
      - cache_internal
    read_only: true
    tmpfs:
      - /tmp:size=32m,nosuid

  runner:
    build:
      context: .
      dockerfile: Dockerfile.runner
    # Security: No public ports
    cpus: 0.5
    mem_limit: 256m
    pids_limit: 128
    networks:
      - runner_internal
    # Security: Lock down the container
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=64m,nosuid
    restart: always

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - codenest-redis:/data
    networks:
      - cache_internal
    restart: always
    cpus: 0.25
    mem_limit: 192m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  public:
    driver: bridge
  runner_internal:
    driver: bridge
    internal: true
  cache_internal:
    driver: bridge
    internal: true

volumes:
  codenest-projects:
    driver: local
  codenest-redis:
    driver: local
