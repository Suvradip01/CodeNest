version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - GROQ_API_KEY=${GROQ_API_KEY}
    volumes:
      - codenest-projects:/app/Backend/projects
    depends_on:
      - runner
    restart: always
    networks:
      - public
      - runner_internal
    read_only: true
    tmpfs:
      - /tmp:size=32m,nosuid

  runner:
    build:
      context: .
      dockerfile: Dockerfile.runner
    # Security: No public ports
    cpus: 0.5
    mem_limit: 256m
    pids_limit: 128
    networks:
      - runner_internal
    # Security: Lock down the container
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=64m,nosuid
    restart: always

networks:
  public:
    driver: bridge
  runner_internal:
    driver: bridge
    internal: true

volumes:
  codenest-projects:
    driver: local
